services:
  postgres:
    image: postgres:16-alpine
    container_name: abitare_marketing_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: abitare_marketing
      POSTGRES_USER: abitare
      POSTGRES_PASSWORD: abitare_dev_password
    ports:
      - "5432:5432"
    volumes:
      - abitare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abitare -d abitare_marketing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  abitare_pgdata:
